###############################################################################
# GitHub Actions CI/CD Pipeline — Multi-Environment
#
# WHAT THIS PIPELINE DOES:
#   Automates the entire flow from code commit to production deployment:
#     1. LINT: Check code formatting and validate configs
#     2. SECURITY SCAN: Run 5 different security scanners
#     3. BUILD: Build container image, push to ECR, scan for vulnerabilities
#     4. TERRAFORM PLAN: Preview infrastructure changes (on Pull Requests)
#     5. DEPLOY: Deploy to the correct environment based on which branch
#
# ENVIRONMENT PROMOTION FLOW:
#   develop branch  → deploys to DEV environment
#   staging branch  → deploys to STAGING environment
#   main branch     → deploys to PRODUCTION environment
#
# HOW THE MATRIX STRATEGY WORKS:
#   Instead of duplicating the deploy job 3 times (once per environment),
#   we use a "matrix" — GitHub Actions runs the SAME job with different
#   variable values. The `include` array maps each branch to its env settings.
###############################################################################

name: DevSecOps CI/CD Pipeline

on:
  push:
    branches: [main, develop, staging]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "staging"
        type: choice
        options:
          - dev
          - staging
          - prod

permissions:
  id-token: write
  contents: read
  security-events: write
  pull-requests: write

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
  TERRAFORM_VERSION: "1.6.6"
  TERRAGRUNT_VERSION: "0.54.12"

# ---------------------------------------------------------------------------
# Concurrency: Cancel in-flight runs for the same branch
# ---------------------------------------------------------------------------
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ===========================================================================
  # Stage 1: Lint and Static Analysis
  #
  # Runs on EVERY push and PR. Checks that code is properly formatted
  # and syntactically valid before wasting time on security scans.
  # ===========================================================================
  lint:
    name: Lint and Static Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Terraform Format Check
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Check Terraform formatting
        run: terraform fmt -check -recursive terraform/

      - name: Validate Terraform configuration
        run: |
          cd terraform/environments/prod
          terraform init -backend=false
          terraform validate

      - name: Lint Kubernetes manifests
        uses: stackrox/kube-linter-action@v1
        with:
          directory: kubernetes/
          config: .kube-linter.yaml
        continue-on-error: true

      - name: YAML Lint
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: kubernetes/
          config_data: |
            extends: default
            rules:
              line-length:
                max: 200
              truthy: disable

      - name: ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: scripts/

  # ===========================================================================
  # Stage 2: Security Scanning
  #
  # Runs 5 scanners in parallel:
  #   - tfsec: Terraform-specific security issues
  #   - Checkov: Broad IaC misconfiguration detection
  #   - Trivy: Filesystem vulnerability scanning
  #   - Kubescape: K8s manifest security (NSA/MITRE frameworks)
  #   - Gitleaks: Secret detection in code
  # ===========================================================================
  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Security Scan (tfsec)
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: terraform/
          soft_fail: false
          format: sarif
          out: tfsec-results.sarif

      - name: Upload tfsec SARIF results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: tfsec-results.sarif
          category: tfsec

      - name: Checkov IaC Scan
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform/
          framework: terraform
          output_format: sarif
          output_file_path: checkov-results.sarif
          soft_fail: true
          skip_check: CKV_AWS_144,CKV_AWS_145

      - name: Upload Checkov SARIF results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: checkov-results.sarif
          category: checkov

      - name: Trivy Filesystem Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs-results.sarif
          severity: CRITICAL,HIGH

      - name: Upload Trivy SARIF results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-fs-results.sarif
          category: trivy-fs

      - name: Kubescape Scan
        uses: kubescape/github-action@main
        with:
          format: sarif
          outputFile: kubescape-results.sarif
          files: kubernetes/
          frameworks: NSA,MITRE
        continue-on-error: true

      - name: Secret Scanning (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ===========================================================================
  # Stage 3: Build and Push Container Images
  #
  # Only runs on push events (not PRs). Builds the Docker image, pushes
  # to ECR, then scans the BUILT image for vulnerabilities.
  # ===========================================================================
  build:
    name: Build Container Images
    runs-on: ubuntu-latest
    needs: security-scan
    if: github.event_name == 'push'
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.ECR_REGISTRY }}/devsecops-platform
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=semver,pattern={{version}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      - name: Trivy Image Vulnerability Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.ECR_REGISTRY }}/devsecops-platform:${{ steps.meta.outputs.version }}
          format: sarif
          output: trivy-image-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"

      - name: Upload Trivy Image SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-image-results.sarif
          category: trivy-image

  # ===========================================================================
  # Stage 4: Terraform Plan (Pull Requests Only)
  #
  # MATRIX STRATEGY: Runs Terraform plan for ALL environments in parallel.
  # This lets PR reviewers see the impact on every environment at once.
  # ===========================================================================
  terraform-plan:
    name: "Terraform Plan (${{ matrix.environment }})"
    runs-on: ubuntu-latest
    needs: security-scan
    if: github.event_name == 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        include:
          - environment: dev
            terraform_dir: terraform/environments/dev
          - environment: staging
            terraform_dir: terraform/environments/staging
          - environment: prod
            terraform_dir: terraform/environments/prod
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Setup Terragrunt
        uses: autero1/action-terragrunt@v3
        with:
          terragrunt-version: ${{ env.TERRAGRUNT_VERSION }}

      - name: Terragrunt Plan
        id: plan
        run: |
          cd ${{ matrix.terraform_dir }}
          terragrunt plan -no-color -out=tfplan 2>&1 | tee plan-output.txt
        env:
          TF_VAR_grafana_admin_password: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
          TF_VAR_slack_webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Comment PR with Plan
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('${{ matrix.terraform_dir }}/plan-output.txt', 'utf8');
            const truncated = plan.length > 60000
              ? plan.substring(0, 60000) + '\n... (truncated)'
              : plan;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Terraform Plan — ${{ matrix.environment }}\n\n<details><summary>Show Plan</summary>\n\n\`\`\`terraform\n${truncated}\n\`\`\`\n\n</details>`
            });

  # ===========================================================================
  # Stage 5: Deploy to Environment
  #
  # MATRIX STRATEGY explained:
  #   The "include" array maps Git branches to environment configs:
  #     - Push to "develop" → deploy to dev
  #     - Push to "staging" → deploy to staging
  #     - Push to "main"    → deploy to prod
  #
  #   Each matrix entry provides:
  #     - environment: Human-readable name
  #     - branch: Which Git branch triggers this environment
  #     - cluster_name: EKS cluster name for kubectl
  #     - terraform_dir: Where to run terragrunt apply
  #     - url: Environment URL for GitHub environment display
  #
  # The "branch-check" step ensures only the matching
  # environment deploys (we don't deploy to prod on a develop push).
  # ===========================================================================
  deploy:
    name: "Deploy to ${{ matrix.environment }}"
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'
    strategy:
      fail-fast: false
      matrix:
        include:
          - environment: dev
            branch: refs/heads/develop
            cluster_name: devsecops-dev-cluster
            terraform_dir: terraform/environments/dev
            url: https://dev.devsecops-platform.com

          - environment: staging
            branch: refs/heads/staging
            cluster_name: devsecops-staging-cluster
            terraform_dir: terraform/environments/staging
            url: https://staging.devsecops-platform.com

          - environment: prod
            branch: refs/heads/main
            cluster_name: devsecops-prod-cluster
            terraform_dir: terraform/environments/prod
            url: https://devsecops-platform.com

    environment:
      name: ${{ matrix.environment }}
      url: ${{ matrix.url }}

    steps:
      - name: Check branch match
        id: branch-check
        run: |
          if [ "${{ github.ref }}" != "${{ matrix.branch }}" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Branch ${{ github.ref }} does not match ${{ matrix.branch }}, skipping"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "Branch matches, proceeding with deployment"
          fi

      - name: Checkout repository
        if: steps.branch-check.outputs.skip != 'true'
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        if: steps.branch-check.outputs.skip != 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terragrunt
        if: steps.branch-check.outputs.skip != 'true'
        uses: autero1/action-terragrunt@v3
        with:
          terragrunt-version: ${{ env.TERRAGRUNT_VERSION }}

      - name: Terragrunt Apply
        if: steps.branch-check.outputs.skip != 'true'
        run: |
          cd ${{ matrix.terraform_dir }}
          terragrunt apply -auto-approve -no-color
        env:
          TF_VAR_grafana_admin_password: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
          TF_VAR_slack_webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Update kubeconfig
        if: steps.branch-check.outputs.skip != 'true'
        run: |
          aws eks update-kubeconfig \
            --name ${{ matrix.cluster_name }} \
            --region ${{ env.AWS_REGION }}

      - name: Sync ArgoCD Applications
        if: steps.branch-check.outputs.skip != 'true'
        run: |
          for app in security-policies monitoring-configs; do
            echo "Syncing ${app}-${{ matrix.environment }}..."
            argocd app sync "${app}-${{ matrix.environment }}" \
              --server argocd.internal.devsecops-platform.com \
              --auth-token ${{ secrets.ARGOCD_AUTH_TOKEN }} \
              --grpc-web \
              --revision ${{ github.sha }} \
              --prune \
              --timeout 300
          done

      - name: Wait for ArgoCD Health
        if: steps.branch-check.outputs.skip != 'true'
        run: |
          for app in security-policies monitoring-configs; do
            echo "Waiting for ${app}-${{ matrix.environment }} to be healthy..."
            argocd app wait "${app}-${{ matrix.environment }}" \
              --server argocd.internal.devsecops-platform.com \
              --auth-token ${{ secrets.ARGOCD_AUTH_TOKEN }} \
              --grpc-web \
              --health \
              --timeout 600
          done

      - name: Run smoke tests
        if: steps.branch-check.outputs.skip != 'true'
        run: |
          echo "=== Running Smoke Tests for ${{ matrix.environment }} ==="
          kubectl run smoke-test \
            --image=curlimages/curl:latest \
            --rm -i --restart=Never -- \
            curl -sf http://app-service.${{ matrix.environment }}.svc.cluster.local/health || exit 1
          echo "Smoke tests passed for ${{ matrix.environment }}"

      - name: Run security validation
        if: steps.branch-check.outputs.skip != 'true' && matrix.environment == 'prod'
        run: |
          echo "=== Validating Security Controls ==="
          echo "Checking Gatekeeper status..."
          kubectl get constrainttemplates
          kubectl get constraints
          echo "Checking Falco status..."
          kubectl get pods -n security-tools -l app.kubernetes.io/name=falco
          echo "Checking Trivy Operator..."
          kubectl get vulnerabilityreports -A --no-headers | wc -l
          echo "Checking Network Policies..."
          kubectl get networkpolicies -A
          echo "=== Security Validation Complete ==="

      - name: Post deployment notification
        if: always() && steps.branch-check.outputs.skip != 'true'
        uses: slackapi/slack-github-action@v1.25.0
        with:
          payload: |
            {
              "text": "${{ matrix.environment }} Deployment: ${{ job.status }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*${{ matrix.environment }} Deployment ${{ job.status == 'success' && 'Succeeded' || 'Failed' }}*\nCommit: `${{ github.sha }}`\nActor: ${{ github.actor }}\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_DEPLOYMENT_WEBHOOK }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
