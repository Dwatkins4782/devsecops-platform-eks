###############################################################################
# STAGING PATCH — Prometheus Alert Rules
#
# WHAT THIS FILE DOES:
#   Modifies the base Prometheus alerting rules for staging:
#     - Longer "for" durations (wait longer before alerting)
#     - Higher thresholds (don't alert on minor issues)
#
#   This prevents alert fatigue in staging while still catching
#   real problems that would affect production.
#
# HOW THIS PATCH WORKS:
#   This is a "strategic merge patch" — Kustomize finds the matching
#   resource by apiVersion+kind+metadata.name, then MERGES these values
#   on top of the base. Only the fields specified here are changed;
#   everything else in the base prometheus-rules.yaml stays the same.
###############################################################################

apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: security-alerts
  namespace: monitoring
spec:
  groups:
    # Override Falco alert — wait 2 minutes instead of 0 in staging
    - name: falco-security-alerts
      rules:
        - alert: FalcoCriticalAlert
          expr: |
            increase(falco_events{priority="Critical"}[5m]) > 0
          for: 2m
          labels:
            severity: warning
            team: security
            category: runtime-security
          annotations:
            summary: "Falco critical security event detected (staging)"
            description: "Falco detected {{ $value }} critical event(s) in the last 5 minutes on {{ $labels.instance }}."

    # Override node alerts — higher thresholds for staging
    - name: node-security-alerts
      rules:
        - alert: NodeHighCPUUsage
          expr: |
            (1 - avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m]))) * 100 > 95
          for: 30m
          labels:
            severity: warning
            team: platform
            category: resource-exhaustion
          annotations:
            summary: "Node CPU usage above 95% (staging threshold)"
            description: "Node {{ $labels.instance }} CPU usage is {{ $value | humanize }}%."

        - alert: PodCrashLooping
          expr: |
            increase(kube_pod_container_status_restarts_total[1h]) > 10
          for: 15m
          labels:
            severity: warning
            team: platform
            category: application-health
          annotations:
            summary: "Pod is crash looping (staging)"
            description: "Pod {{ $labels.namespace }}/{{ $labels.pod }} has restarted {{ $value }} times in the last hour."
